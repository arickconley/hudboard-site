<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad3b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#grad3b)"/>

  <!-- Back note card -->
  <rect x="18" y="10" width="32" height="24" rx="4" fill="white" opacity="0.35"/>

  <!-- Front note card -->
  <rect x="14" y="18" width="32" height="24" rx="4" fill="white"/>

  <!-- Lines suggesting text content -->
  <rect x="19" y="24" width="20" height="2.5" rx="1.25" fill="#0ea5e9" opacity="0.5"/>
  <rect x="19" y="30" width="16" height="2.5" rx="1.25" fill="#0ea5e9" opacity="0.5"/>
  <rect x="19" y="36" width="22" height="2.5" rx="1.25" fill="#0ea5e9" opacity="0.5"/>

  <!-- Real-time indicator dot -->
  <circle cx="50" cy="52" r="5" fill="white"/>
  <circle cx="50" cy="52" r="2.5" fill="#22c55e"/>
</svg>
