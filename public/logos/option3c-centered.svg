  <!-- Subtle text lines on front card -->
  <rect x="17" y="30" width="16" height="2" rx="1" fill="#0ea5e9" opacity="0.35"/>
  <rect x="17" y="35" width="12" height="2" rx="1" fill="#0ea5e9" opacity="0.35"/>
  <rect x="17" y="40" width="18" height="2" rx="1" fill="#0ea5e9" opacity="0.35"/>
