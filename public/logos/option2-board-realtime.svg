<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#grad2)"/>

  <!-- Grid of note cards -->
  <!-- Top left card -->
  <rect x="10" y="14" width="18" height="14" rx="3" fill="white" opacity="0.9"/>
  <!-- Top right card -->
  <rect x="32" y="14" width="22" height="14" rx="3" fill="white" opacity="0.9"/>
  <!-- Bottom left card -->
  <rect x="10" y="32" width="22" height="18" rx="3" fill="white" opacity="0.9"/>
  <!-- Bottom right card -->
  <rect x="36" y="32" width="18" height="18" rx="3" fill="white" opacity="0.9"/>

  <!-- Real-time pulse indicator -->
  <circle cx="52" cy="12" r="6" fill="#22c55e"/>
  <circle cx="52" cy="12" r="6" fill="#22c55e" opacity="0.5">
    <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
