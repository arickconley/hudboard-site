<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#grad1)"/>

  <!-- HUD-style H with corner brackets -->
  <!-- Left vertical of H -->
  <rect x="16" y="18" width="6" height="28" rx="1" fill="white"/>
  <!-- Right vertical of H -->
  <rect x="42" y="18" width="6" height="28" rx="1" fill="white"/>
  <!-- Horizontal bar of H -->
  <rect x="16" y="29" width="32" height="6" rx="1" fill="white"/>

  <!-- HUD corner brackets -->
  <!-- Top left -->
  <path d="M8 12 L8 8 L12 8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Top right -->
  <path d="M52 8 L56 8 L56 12" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Bottom left -->
  <path d="M8 52 L8 56 L12 56" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Bottom right -->
  <path d="M52 56 L56 56 L56 52" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
