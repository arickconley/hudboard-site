<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#grad1b)"/>

  <!-- HUD reticle corners (board frame) -->
  <!-- Top left -->
  <path d="M10 18 L10 10 L18 10" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Top right -->
  <path d="M46 10 L54 10 L54 18" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Bottom left -->
  <path d="M10 46 L10 54 L18 54" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Bottom right -->
  <path d="M46 54 L54 54 L54 46" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Note cards inside the HUD frame (the board) -->
  <!-- Back card -->
  <rect x="26" y="16" width="20" height="14" rx="2" fill="white" opacity="0.4"/>
  <!-- Front card -->
  <rect x="18" y="22" width="20" height="14" rx="2" fill="white"/>

  <!-- Text lines on front card -->
  <rect x="21" y="26" width="12" height="2" rx="1" fill="#0ea5e9" opacity="0.4"/>
  <rect x="21" y="30" width="8" height="2" rx="1" fill="#0ea5e9" opacity="0.4"/>

  <!-- Third card at bottom -->
  <rect x="22" y="40" width="20" height="10" rx="2" fill="white" opacity="0.7"/>
  <rect x="25" y="44" width="10" height="2" rx="1" fill="#0ea5e9" opacity="0.4"/>
</svg>
